<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Prescription | Doctor Panel</title>

<link rel="stylesheet" href="create-prescription.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="container">

<div class="header">
<h1>Create Prescription</h1>
<br/>
</div>

<div class="card">

<div class="grid">

<div class="field">
<label>Medicine</label>
<input type="text" id="medicine" placeholder="e.g. Paracetamol 500mg">
</div>

<div class="field">
<label>Dosage</label>
<input type="text" id="dosage" placeholder="e.g. 1 tablet twice daily">
</div>

<div class="field full">
<label>Instructions</label>
<textarea id="instructions" placeholder="e.g. Take after meals, avoid cold drinks"></textarea>
</div>

<div class="field full">
<label>Diagnosis</label>
<textarea id="diagnosis" placeholder="e.g. Viral fever, hypertension"></textarea>
</div>

</div>

<div class="actions">

<button class="save" onclick="savePrescription()">
<i class="fa fa-save"></i> Save Prescription
</button>

<button class="email" onclick="sendEmail()">
<i class="fa fa-envelope"></i> Send Email
</button>

</div>

</div>

</div>

<script src="create-prescription.js"></script>

</body>
</html>
