<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Appointments | HealthCare+</title>

<link rel="stylesheet" href="my-appointments.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="container">

<div class="header">
<h1>My Appointments</h1>
<br/>
</div>

<div class="grid">

<div class="card">
<div class="top">

<div class="doctor">
<i class="fa fa-user-doctor"></i>
<div>
<h3>Dr. Sarah Ahmed</h3>
<span>Cardiologist</span>
</div>
</div>

<span class="status pending">Pending</span>

</div>

<div class="info">
<p><i class="fa fa-calendar"></i> 2026-06-25</p>
<p><i class="fa fa-clock"></i> 10:00 AM</p>
</div>

<div class="actions">
<button class="view">View</button>
<button class="reschedule">Reschedule</button>
<button class="cancel">Cancel</button>
</div>
</div>

<div class="card">
<div class="top">

<div class="doctor">
<i class="fa fa-user-doctor"></i>
<div>
<h3>Dr. John Smith</h3>
<span>Neurologist</span>
</div>
</div>

<span class="status confirmed">Confirmed</span>

</div>

<div class="info">
<p><i class="fa fa-calendar"></i> 2026-06-20</p>
<p><i class="fa fa-clock"></i> 02:00 PM</p>
</div>

<div class="actions">
<button class="view">View</button>
<button class="reschedule">Reschedule</button>
<button class="cancel">Cancel</button>
</div>
</div>

<div class="card">
<div class="top">

<div class="doctor">
<i class="fa fa-user-doctor"></i>
<div>
<h3>Dr. Emily Wilson</h3>
<span>Dermatologist</span>
</div>
</div>

<span class="status completed">Completed</span>

</div>

<div class="info">
<p><i class="fa fa-calendar"></i> 2026-06-15</p>
<p><i class="fa fa-clock"></i> 11:30 AM</p>
</div>

<div class="actions">
<button class="view">View Prescription</button>
</div>
</div>

</div>

</div>

<script src="my-appointments.js"></script>

</body>
</html>
