<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doctor Profile | HealthCare+</title>

<link rel="stylesheet" href="doctor-profile.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="container">

<div class="header">
<h1>Doctor Profile</h1>
<br/>
</div>

<div class="card">

<div class="profile-top">

<div class="avatar">
<i class="fa fa-user-doctor"></i>
</div>

<div class="info">
<h2>Dr. Sarah Ahmed</h2>
<p>Cardiologist</p>
</div>

</div>

<div class="form">

<div class="field">
<label>Qualification</label>
<input type="text" id="qualification" value="MBBS, MD (Cardiology)">
</div>

<div class="field">
<label>Experience</label>
<input type="text" id="experience" value="10 Years">
</div>

<div class="field">
<label>Consultation Fee</label>
<input type="text" id="fee" value="$30">
</div>

<div class="field">
<label>Availability</label>
<input type="text" id="availability" value="Mon - Fri | 9:00 AM - 5:00 PM">
</div>

</div>

<button onclick="updateProfile()">
<i class="fa fa-pen-to-square"></i> Update Profile
</button>

</div>

</div>

<script src="doctor-profile.js"></script>

</body>
</html>
