<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointment Requests | Doctor Panel</title>

<link rel="stylesheet" href="appointment-requests.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="container">

<div class="header">
<h1>Appointment Requests</h1>
<br/>
</div>

<div class="card">

<table>

<thead>
<tr>
<th>Patient</th>
<th>Date</th>
<th>Time</th>
<th>Reason</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr>
<td>John Doe</td>
<td>2026-06-21</td>
<td>10:00 AM</td>
<td>Chest pain consultation</td>
<td class="actions">
<button class="view"><i class="fa fa-eye"></i></button>
<button class="approve"><i class="fa fa-check"></i></button>
<button class="reject"><i class="fa fa-xmark"></i></button>
</td>
</tr>

<tr>
<td>Emma Wilson</td>
<td>2026-06-22</td>
<td>11:30 AM</td>
<td>Skin allergy</td>
<td class="actions">
<button class="view"><i class="fa fa-eye"></i></button>
<button class="approve"><i class="fa fa-check"></i></button>
<button class="reject"><i class="fa fa-xmark"></i></button>
</td>
</tr>

<tr>
<td>Michael Brown</td>
<td>2026-06-23</td>
<td>02:00 PM</td>
<td>Headache & dizziness</td>
<td class="actions">
<button class="view"><i class="fa fa-eye"></i></button>
<button class="approve"><i class="fa fa-check"></i></button>
<button class="reject"><i class="fa fa-xmark"></i></button>
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script src="appointment-requests.js"></script>

</body>
</html>
