<body>

<div class="container">

<div class="doctor-card">

</div>

<h2>Dr. Sarah Ahmed</h2>
<p class="specialization">Cardiologist</p>

<div class="rating">
⭐⭐⭐⭐⭐ <span>4.9</span>
</div>

<a href="book-appointment.html" class="book-btn">
Book Appointment

<div>

<p>MBBS, MD (Cardiology)</p>
</div>
</div>

<div class="info">

<div>
<strong>Experience</strong>
<p>10+ Years</p>
</div>
</div>

<div class="info">
<i class="fa fa-stethoscope"></i>

</div>
</div>

<div class="info">
<i class="fa fa-hospital"></i>
<div>
<strong>Hospital</strong>

</div>
</div>

<div class="info">
<i class="fa fa-money-bill"></i>
<div>
<strong>Fee</strong>
<p>$30 per consultation</p>
</div>
</div>

</div>
