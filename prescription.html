<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prescription | HealthCare+</title>

<link rel="stylesheet" href="prescription.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="container">

<div class="page-header">
<h1>Medical Prescription</h1>
<br/>
</div>

<div class="card">

<div class="top">

<div class="doctor">
<div class="avatar">
<i class="fa fa-user-doctor"></i>
</div>

<div>
<h2>Dr. Sarah Ahmed</h2>
<p>Cardiologist</p>
</div>
</div>

<div class="date-box">
<i class="fa fa-calendar"></i>
<span>20 June 2026</span>
</div>

</div>

<div class="content">

<div class="left">

<div class="box">
<h3>Hospital</h3>
<p>HealthCare+ Clinic</p>
</div>

<div class="box">
<h3>Patient Notes</h3>
<p>Blood pressure monitoring required</p>
</div>

<div class="box highlight">
<h3>Advice</h3>
<p>
Avoid stress, maintain proper sleep schedule and reduce salt intake.
</p>
</div>

</div>

<div class="right">

<div class="section-title">
<i class="fa fa-pills"></i>
<h3>Medicines</h3>
</div>

<div class="medicine">
<p><b>Atenolol 50mg</b> <span>1x daily</span></p>
<p><b>Paracetamol 500mg</b> <span>after meal</span></p>
</div>

</div>

</div>

<div class="actions">

<button class="pdf">
<i class="fa fa-download"></i>
Download PDF
</button>

<button class="email">
<i class="fa fa-envelope"></i>
Send Email
</button>

</div>

</div>

</div>

<script src="prescription.js"></script>

</body>
</html>
