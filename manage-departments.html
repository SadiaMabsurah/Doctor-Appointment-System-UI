<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Departments | HealthCare+</title>

<link rel="stylesheet" href="manage-departments.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="container">
<div class="header">
<h1>Department Management</h1>
</div>

<div class="glass-card">

<div class="add-box">
<h3><i class="fa fa-plus-circle"></i> Add Department</h3>

<div class="input-group">
<input type="text" id="deptName" placeholder="e.g. Cardiology, Neurology">
<button onclick="addDepartment()">Add</button>
</div>

</div>

</div>

<div class="glass-card table-card">

<table>

<thead>
<tr>
<th>Department</th>
<th>Doctors</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

<tr>
<td>Cardiology</td>
<td>12 Doctors</td>
<td><span class="tag active">Active</span></td>
<td class="actions">
<button class="edit"><i class="fa fa-pen"></i></button>
<button class="delete"><i class="fa fa-trash"></i></button>
</td>
</tr>

<tr>
<td>Neurology</td>
<td>8 Doctors</td>
<td><span class="tag active">Active</span></td>
<td class="actions">
<button class="edit"><i class="fa fa-pen"></i></button>
<button class="delete"><i class="fa fa-trash"></i></button>
</td>
</tr>

<tr>
<td>Orthopedics</td>
<td>5 Doctors</td>
<td><span class="tag inactive">Limited</span></td>
<td class="actions">
<button class="edit"><i class="fa fa-pen"></i></button>
<button class="delete"><i class="fa fa-trash"></i></button>
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script src="manage-departments.js"></script>

</body>
</html>
